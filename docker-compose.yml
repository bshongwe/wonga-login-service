version: '3.8'

services:
  frontend:
    build:
      context: ./wonga-login-service-client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - wonga-network

  backend:
    build:
      context: ./wonga-login-service-server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=WongaLoginDb;Username=postgres;Password=YourStrong@Passw0rd
    depends_on:
      - db
    networks:
      - wonga-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourStrong@Passw0rd
      - POSTGRES_DB=WongaLoginDb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - wonga-network

networks:
  wonga-network:
    driver: bridge

volumes:
  postgres-data:
